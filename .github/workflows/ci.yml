name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: Quality (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Check out source
        uses: actions/checkout@v4
      - name: Install pinned toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy
      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Check workspace
        run: cargo check --workspace
      - name: Check all workspace targets
        run: cargo check --workspace --all-targets
      - name: Run tests
        run: cargo test --workspace
      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Build documentation
        run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: -D warnings
      - name: Check dependency direction
        run: bash scripts/check-dependency-direction.sh
      - name: Check runtime boundaries
        if: runner.os == 'Linux'
        run: bash scripts/check-runtime-boundaries.sh
      - name: Check fixture manifest
        if: runner.os == 'Linux'
        run: bash scripts/check-fixture-manifest.sh
      - name: Check NTCP2 vectors
        if: runner.os == 'Linux'
        run: bash scripts/check-ntcp2-vectors.sh
      - name: Check NTCP2 interoperability evidence boundary
        if: runner.os == 'Linux'
        run: bash scripts/check-ntcp2-interoperability.sh

  msrv:
    name: MSRV (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4
      - name: Install declared MSRV toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.85.0
      - name: Check workspace on MSRV
        run: cargo check --workspace --all-targets

  dependency-policy:
    name: Dependency policy
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4
      - name: Install pinned toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.95.0
      - name: Check advisories, bans, and sources
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans sources
